version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hongxi
      POSTGRES_PASSWORD: hongxi123
      POSTGRES_DB: hongxi_bid
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hongxi -d hongxi_bid"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://hongxi:hongxi123@db:5432/hongxi_bid
      DATABASE_URL_SYNC: postgresql+psycopg2://hongxi:hongxi123@db:5432/hongxi_bid
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      CORS_ORIGINS: '["http://localhost"]'
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TEMPLATE_DIR: /app/templates
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - outputs:/usr/share/nginx/html/outputs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  outputs:
